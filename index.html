<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Baking Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="logo" id="logo">The Baking Quiz</div>
        <nav>
            <a href="#" id="nav-quiz">Quiz</a>
            <a href="#" id="nav-recipes">Recipes</a>
        </nav>
    </header>

    <main>
        <section id="hero" class="hero">
            <h1>What pastry are you going to bake today?</h1>
            <p>Answer a few questions, and find your perfect pastry match!</p>
            <button id="start-btn">Start the Quiz</button>
        </section>

        <section id="quiz" class="container hidden">
            <div class="progress-bar">
                <div id="progress-fill" class="progress"></div>
            </div>
            <div class="quiz-card">
                <h2 id="question-text">How much time do you have?</h2>
                <div class="options">
                    <button class="option-btn">Less than 30 minutes</button>
                    <button class="option-btn">Less than 1 hour</button>
                    <button class="option-btn">All the time in the world</button>
                </div>
            </div>
        </section>

        <section id="results" class="container hidden">
            <h2>Your Result...</h2>
            <div class="results-grid">
                <div class="card">
                    <div class="img-container">
                        <img id="result-img" src="images/cookie.jpg" alt="Cookies" style="width: 100%; height: auto; border-radius: 8px;">
                    </div>
                    <h3 id="result-title">Cookies</h3>
                    <p id="result-match">Match: 95%</p>
                    <button id="recipe-btn" class="recipe-btn">View Recipe</button>
                </div>
            </div>
        </section>

        <section id="recipe-display" class="container hidden"></section>

        <section id="all-recipes" class="container hidden">
            <h1>All our recipes</h1>
            <div id="recipes-grid" class="results-grid">
                </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
