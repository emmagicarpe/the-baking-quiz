<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Baking Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">The Baking Quiz</div>
    </header>

    <main>
        <section id="hero" class="hero">
            <h1>What pastry are you going to bake today?</h1>
            <p>Answer a few questions, and find your perfect pastry match!</p>
            <button id="start-btn">Start the Quiz</button>
        </section>

        <section id="quiz" class="quiz hidden">
            <div class="quiz-card">
                <h2 id="question-text">How much time do you have?</h2>
                <div class="options">
                    <button class="option-btn">Less than 30 minutes</button>
                    <button class="option-btn">Less than 1 hour</button>
                    <button class="option-btn">All the time in the world</button>
                </div>
            </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
